{% extends "base.html" %}{% block title %}SERE - Avisos{% endblock %}{% block content %}<div class="mb-6"><h1 class="text-3xl font-black">Avisos</h1><p class="muted">O que pede atenção agora.</p></div><section class="space-y-2">{% for aviso in avisos %}<a class="grid-row grid-cols-[120px_1fr]" href="{{ aviso.link }}"><span class="pill">{{ aviso.tipo }}</span><span><strong>{{ aviso.titulo }}</strong><small class="muted block">{{ aviso.texto }}</small></span></a>{% else %}<div class="card"><strong>Nenhum aviso pendente.</strong></div>{% endfor %}</section>{% endblock %}
