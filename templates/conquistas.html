{% extends "base.html" %}{% block title %}SERE - Conquistas{% endblock %}{% block content %}<div class="mb-6"><h1 class="text-3xl font-black">Conquistas</h1><p class="muted">Marcos de progresso e participação.</p></div><section class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">{% for c in conquistas %}<article class="card {% if c.status != 'Desbloqueada' %}opacity-60{% endif %}"><span class="pill">{{ c.status }}</span><h2 class="mt-3 text-xl font-black">{{ c.nome }}</h2><p class="muted">{{ c.aluno.nome }}</p><p class="muted mt-2 text-sm">{{ c.descricao }}</p></article>{% endfor %}</section>{% endblock %}
